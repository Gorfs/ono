name: build-debian-unstable
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zapashcanon/gitea-ocaml-ci:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Restore opam switch cache
        id: opam-cache
        uses: actions/cache/restore@v4
        with:
          path: _opam
          key: ${{ runner.os }}-opam-${{ hashFiles('dune-project', 'ono.opam', 'vendor/owi/dune-project', 'vendor/owi/owi.opam') }}
          restore-keys: |
            ${{ runner.os }}-opam-

      - name: Prepare dependencies
        run: |
          set -euxo pipefail

          export HOME=/root
          
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          # Prepare OCaml stuff
          export OPAMCONFIRMLEVEL=unsafe-yes
          export OPAMYES=1

          apt-get update
          apt-get install -y --no-install-recommends libgmp-dev pkg-config python3

          opam update

          if [ ! -d "_opam" ]; then
            opam switch create . --deps-only
          fi
          eval "$(opam env --switch=. --set-switch)"

          # Install system and opam-repo dependencies
          opam install . --with-test --with-dev-setup --with-doc --deps-only

      - name: Save opam switch cache
        if: ${{ steps.opam-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: _opam
          key: ${{ runner.os }}-opam-${{ hashFiles('dune-project', 'ono.opam', 'vendor/owi/dune-project', 'vendor/owi/owi.opam') }}

      - name: Build and test
        run: |
          set -x

          export HOME=/root
          eval "$(opam env --switch=. --set-switch)"

          dune build @install
          dune runtest